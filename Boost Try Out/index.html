<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ripley Boost — Presentaciones</title>
  <meta name="description" content="Plataforma de presentaciones interactivas de Ripley Boost.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/css/base.css">
  <style>
    /* Landing-specific styles */
    .landing {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--space-2xl) var(--container-padding);
      background: var(--color-bg-dark);
      text-align: center;
    }
    .landing__logo {
      font-size: 2.5rem;
      font-weight: 800;
      color: var(--color-white);
      display: inline-flex;
      align-items: center;
      gap: 0.35em;
      margin-bottom: var(--space-xs);
    }
    .landing__logo span {
      background: var(--color-accent);
      color: var(--color-white);
      padding: 0.1em 0.45em;
      border-radius: 6px;
      font-weight: 800;
    }
    .landing__subtitle {
      font-size: 1.1rem;
      color: var(--color-text-muted);
      margin-bottom: var(--space-3xl);
      font-weight: var(--font-weight-medium);
    }
    .landing__grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 420px));
      gap: var(--space-lg);
      justify-content: center;
      width: 100%;
      max-width: 1000px;
    }
    .presentation-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: var(--radius-lg);
      padding: var(--space-2xl) var(--space-xl);
      text-align: left;
      transition: all 0.35s ease;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      cursor: pointer;
      text-decoration: none;
    }
    .presentation-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--color-accent), var(--color-accent-light));
      opacity: 0;
      transition: opacity 0.35s ease;
    }
    .presentation-card:hover::before { opacity: 1; }
    .presentation-card:hover {
      transform: translateY(-8px);
      border-color: rgba(255,20,147,0.4);
      box-shadow: 0 8px 40px rgba(255,20,147,0.12), 0 0 60px rgba(255,20,147,0.06);
    }
    .presentation-card__badge {
      display: inline-block;
      background: var(--color-accent);
      color: white;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 0.3em 0.8em;
      border-radius: 4px;
      margin-bottom: var(--space-md);
      align-self: flex-start;
    }
    .presentation-card__title {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--color-white);
      text-transform: uppercase;
      margin-bottom: 0.3em;
      line-height: 1.1;
    }
    .presentation-card__event {
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--color-accent);
      text-transform: uppercase;
      margin-bottom: var(--space-sm);
    }
    .presentation-card__desc {
      font-size: 0.95rem;
      color: var(--color-text-muted);
      line-height: 1.6;
      margin-bottom: var(--space-lg);
      flex: 1;
    }
    .presentation-card__cta {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--color-accent);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      display: flex;
      align-items: center;
      gap: 0.5em;
      transition: gap 0.3s ease;
    }
    .presentation-card:hover .presentation-card__cta { gap: 0.8em; }
    .presentation-card__cta-arrow {
      display: inline-block;
      transition: transform 0.3s ease;
    }
    .presentation-card:hover .presentation-card__cta-arrow { transform: translateX(4px); }

    /* Placeholder card for future presentations */
    .presentation-card--placeholder {
      border-style: dashed;
      border-color: rgba(255,255,255,0.1);
      cursor: default;
      justify-content: center;
      align-items: center;
      text-align: center;
      min-height: 300px;
    }
    .presentation-card--placeholder:hover {
      transform: none;
      border-color: rgba(255,255,255,0.15);
      box-shadow: none;
    }
    .presentation-card--placeholder::before { display: none; }
    .placeholder-text {
      color: var(--color-text-muted);
      font-size: 0.9rem;
      font-weight: var(--font-weight-medium);
    }
    .placeholder-icon {
      font-size: 2rem;
      opacity: 0.3;
      margin-bottom: var(--space-sm);
    }

    @media (max-width: 768px) {
      .landing__grid { grid-template-columns: 1fr; }
      .landing__logo { font-size: 2rem; }
    }
  </style>
</head>
<body>
  <div class="landing">
    <div class="landing__logo">ripley <span>boost</span></div>
    <p class="landing__subtitle">Presentaciones Interactivas</p>

    <div class="landing__grid">
      <!-- Ripley Boost / Try Out -->
      <a href="/brands/ripley-boost-tryout/" class="presentation-card">
        <span class="presentation-card__badge">Activa</span>
        <h2 class="presentation-card__title">Ripley Boost</h2>
        <p class="presentation-card__event">/Try Out</p>
        <p class="presentation-card__desc">
          Bienvenida a la primera gran instancia del proceso. Una experiencia diseñada para conocer tu potencial, tu energía y tu fit con la cultura del negocio.
        </p>
        <span class="presentation-card__cta">
          Ingresar <span class="presentation-card__cta-arrow">→</span>
        </span>
      </a>

      <!-- Placeholder para futuras presentaciones -->
      <div class="presentation-card presentation-card--placeholder">
        <div class="placeholder-icon">+</div>
        <p class="placeholder-text">Próxima presentación</p>
      </div>
    </div>
  </div>

  <!-- Minimal animation for landing -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    gsap.fromTo('.landing__logo', { opacity: 0, y: -20 }, { opacity: 1, y: 0, duration: 0.8, ease: 'power3.out' });
    gsap.fromTo('.landing__subtitle', { opacity: 0, y: -10 }, { opacity: 1, y: 0, duration: 0.6, delay: 0.2, ease: 'power3.out' });
    gsap.fromTo('.presentation-card', { opacity: 0, y: 40 }, { opacity: 1, y: 0, duration: 0.7, stagger: 0.15, delay: 0.4, ease: 'power3.out' });
  </script>
</body>
</html>
